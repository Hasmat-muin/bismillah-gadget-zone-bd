<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Bismillah Gadget Zone BD</title>
    <style>
        :root {
            --primary: #0f2635;
            --accent: #c5a059;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-main);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 🔐 Login Card Style */
        .login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 38, 53, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        .login-container h2 {
            margin-bottom: 25px;
            color: var(--primary);
            font-size: 22px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-dark);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .login-btn {
            background: var(--primary);
            color: var(--accent);
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        /* 🖥️ Main Admin Dashboard Panel (Hidden Default) */
        #adminPanelMain {
            display: none;
            width: 100%;
            max-width: 1200px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin: 20px;
            box-sizing: border-box;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .admin-header h1 {
            font-size: 24px;
            color: var(--primary);
            margin: 0;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Forms Layout */
        .admin-sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .admin-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .admin-card h3 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 6px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .btn-success {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn-secondary {
            background: #64748b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 5px;
        }

        .variant-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        
        .variant-row input {
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="login-container" id="loginCard">
        <h2>Admin Login Panel</h2>
        <form onsubmit="handleAdminLogin(event);">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="adminUser" placeholder="ইউজারনেম দিন" required autocomplete="username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="adminPass" placeholder="পাসওয়ার্ড দিন" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
        </form>
    </div>

    <div id="adminPanelMain">
        <div class="admin-header">
            <h1>Bismillah Gadget Zone - Dashboard</h1>
            <button class="logout-btn" onclick="adminLogout()">Logout 🔓</button>
        </div>

        <div class="admin-sections">
            <div class="admin-card">
                <h3>📁 Create Category</h3>
                <form onsubmit="createNewCategory(event);">
                    <div class="input-group">
                        <label>New Category Name</label>
                        <input type="text" id="newCategoryName" placeholder="যেমন: Smart Watch" required>
                    </div>
                    <button type="submit" class="btn-success">Save Category</button>
                </form>
            </div>

            <div class="admin-card">
                <h3>📦 Add New Product</h3>
                <div class="input-group">
                    <label>Product Title</label>
                    <input type="text" id="prodName" placeholder="যেমন: T900 Ultra Smart Watch">
                </div>
                <div class="input-group">
                    <label>Base Price (৳)</label>
                    <input type="number" id="prodPrice" placeholder="যেমন: 1250">
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="prodCategory" style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1;"></select>
                </div>
                <div class="input-group">
                    <label>Video URL (Optional)</label>
                    <input type="url" id="prodVideo" placeholder="https://youtube.com/...">
                </div>
                <div class="input-group">
                    <label>Description / Specification</label>
                    <textarea id="prodDetails" placeholder="প্রোডাক্টের বিবরণ লিখুন..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1;" rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label>Main Showcase Image</label>
                    <input type="file" id="prodMainImage" accept="image/*">
                </div>

                <div style="margin-top:15px; background:#fff; padding:10px; border-radius:8px; border:1px solid #cbd5e1;">
                    <label style="font-weight:bold; font-size:13px; color:var(--text-dark);">Product Variants (Optional)</label>
                    <div id="variantContainer" style="margin-top:10px;"></div>
                    <button type="button" class="btn-secondary" style="font-size:11px;" onclick="addVariantRow()">+ Add Color/Variant</button>
                </div>

                <button class="btn-success" onclick="uploadProductWithImages()" style="margin-top:15px; background:var(--primary); color:var(--accent);">Publish Product 🚀</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check session storage on window load
        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem("adminLoggedIn") === "true") {
                showAdminPanel();
            }
        });

        function showAdminPanel() {
            document.getElementById('loginCard').style.display = 'none';
            // Flex design use na kore clear block use kora holo jeno design breakdown na hoy
            document.getElementById('adminPanelMain').style.display = 'block'; 
            document.body.style.alignItems = 'flex-start'; // dashboard frame view setup
            if (typeof fetchProducts === 'function') { fetchProducts(); }
        }

        function adminLogout() {
            sessionStorage.removeItem("adminLoggedIn");
            alert("🔒 সফলভাবে লগআউট করা হয়েছে!");
            window.location.reload();
        }
    </script>
</body>
</html>
