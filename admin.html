<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Bismillah Gadget Zone BD</title>
    <script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
    <style>
        :root {
            --primary: #0f2635;
            --accent: #c5a059;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-main);
            margin: 0; padding: 0; color: var(--text-dark);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .login-container {
            background: var(--card-bg); padding: 40px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 38, 53, 0.1); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box;
        }

        .login-container h2 { margin-bottom: 25px; color: var(--primary); font-size: 22px; font-weight: 700; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: var(--text-dark); }
        .input-group input, .input-group select {
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none;
        }

        .login-btn {
            background: var(--primary); color: var(--accent); border: none; width: 100%; padding: 12px; font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer;
        }

        #adminPanelMain {
            display: none; width: 100%; max-width: 1200px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin: 20px; box-sizing: border-box;
        }

        .admin-header {
            display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 25px;
        }

        .admin-header h1 { font-size: 24px; color: var(--primary); margin: 0; }

        .logout-btn { background: #ef4444; color: white; border: none; padding: 8px 16px; font-weight: 600; border-radius: 6px; cursor: pointer; }

        .admin-sections { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }

        .admin-card { background: #f8fafc; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; }

        .admin-card h3 {
            margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 6px; display: inline-block; margin-bottom: 15px;
        }

        .btn-success {
            background: #10b981; color: white; border: none; padding: 10px 15px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 10px;
        }

        .btn-secondary { background: #64748b; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

        .product-manage-row {
            display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 8px;
        }

        .prod-info-left { display: flex; align-items: center; gap: 12px; }
        .prod-info-left img { width: 50px; height: 50px; object-fit: contain; border-radius: 4px; border: 1px solid #cbd5e1; background: #f8fafc; }

        .edit-prod-btn, .delete-prod-btn, .delete-cat-btn {
            border: none; padding: 6px 12px; font-size: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; color: white;
        }
        .edit-prod-btn { background: #3b82f6; margin-right: 6px; }
        .delete-prod-btn, .delete-cat-btn { background: #ef4444; }

        .ck-editor__editable_inline { min-height: 200px; }
    </style>
</head>
<body>

    <div class="login-container" id="loginCard">
        <h2>Admin Login Panel</h2>
        <form onsubmit="handleAdminLogin(event);">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="adminUser" placeholder="ইউজারনেম দিন" required autocomplete="username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="adminPass" placeholder="পাসওয়ার্ড দিন" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
        </form>
    </div>

    <div id="adminPanelMain">
        <div class="admin-header">
            <h1>Bismillah Gadget Zone - Dashboard</h1>
            <button class="logout-btn" onclick="adminLogout()">Logout 🔓</button>
        </div>

        <div class="admin-sections">
            <div>
                <!-- 🖼️ Billboard -->
                <div class="admin-card">
                    <h3>🖼️ Manage Billboard Banners</h3>
                    <div class="input-group">
                        <label>Upload Banner Image OR MP4 Video</label>
                        <input type="file" id="billboardImageInput" accept="image/*,video/mp4">
                    </div>
                    <div class="input-group">
                        <label>Target Category</label>
                        <select id="billboardCategorySelect"></select>
                    </div>
                    <button class="btn-success" onclick="uploadBillboardBanner()" id="uploadBannerBtn" style="background:var(--primary); color:var(--accent);">Add Billboard Media 🚀</button>
                    <div id="adminBillboardList" style="margin-top:15px; display:flex; flex-direction:column; gap:8px;"></div>
                </div>

                <!-- 📄 POLICY PAGES EDITOR -->
                <div class="admin-card">
                    <h3>📑 Edit Footer Policy Pages</h3>
                    <div class="input-group">
                        <label>Select Page to Edit</label>
                        <select id="policyPageType" onchange="loadPageContentToEdit()">
                            <option value="refund">রিফান্ড ও রিটার্ন পলিসি (Refund Policy)</option>
                            <option value="terms">টার্মস এবং কন্ডিশন (Terms & Conditions)</option>
                            <option value="delivery">ডেলিভারি সংক্রান্ত তথ্য (Delivery Info)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Page Details / Text</label>
                        <textarea id="policyDetails" rows="4" placeholder="পেজের বিস্তারিত লিখুন..."></textarea>
                    </div>
                    <button class="btn-success" onclick="savePageContent()">Save Policy Page 💾</button>
                </div>

                <!-- 📁 Category -->
                <div class="admin-card">
                    <h3>📁 Create Category</h3>
                    <form onsubmit="createNewCategory(event);">
                        <div class="input-group">
                            <label>New Category Name</label>
                            <input type="text" id="newCategoryName" placeholder="যেমন: Men Shoes" required>
                        </div>
                        <button type="submit" class="btn-success">Save Category</button>
                    </form>
                </div>
            </div>

            <!-- 📦 Add/Edit Product -->
            <div class="admin-card" id="formScrollTarget">
                <h3 id="formActionTitle">📦 Add New Product</h3>
                
                <div class="input-group">
                    <label>Product Title</label>
                    <input type="text" id="prodName" placeholder="যেমন: T900 Ultra Smartwatch">
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="input-group" style="flex:1;">
                        <label>Regular Price (আসল দাম ৳)</label>
                        <input type="number" id="prodRegularPrice" placeholder="যেমন: 1500">
                    </div>
                    <div class="input-group" style="flex:1;">
                        <label>Offer Price (বিক্রয় মূল্য ৳)</label>
                        <input type="number" id="prodPrice" placeholder="যেমন: 1200">
                    </div>
                </div>

                <div style="display:flex; gap:10px;">
                    <div class="input-group" style="flex:1;">
                        <label>Stock Status</label>
                        <select id="prodStockStatus">
                            <option value="In Stock">In Stock (স্টকে আছে)</option>
                            <option value="Out of Stock">Out of Stock (স্টকে নেই)</option>
                        </select>
                    </div>
                    <div class="input-group" style="flex:1;">
                        <label>Stock Quantity</label>
                        <input type="number" id="prodStockQty" placeholder="যেমন: 10" value="10">
                    </div>
                </div>

                <div class="input-group">
                    <label>Category</label>
                    <select id="prodCategory"></select>
                </div>
                <div class="input-group">
                    <label>Sizes (Optional)</label>
                    <input type="text" id="prodSizes" placeholder="যেমন: 39, 40, 41, 42">
                </div>
                <div class="input-group">
                    <label>Video URL (Optional)</label>
                    <input type="url" id="prodVideo" placeholder="https://youtube.com/...">
                </div>
                <div class="input-group">
                    <label>Description / Specification</label>
                    <textarea id="prodDetails" placeholder="প্রোডাক্টের বিবরণ..." rows="3"></textarea>
                </div>
                <div class="input-group">
                    <label>Main Showcase Image</label>
                    <input type="file" id="prodMainImage" accept="image/*">
                </div>

                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn-success" onclick="uploadProductWithImages()" id="publishBtn" style="background:var(--primary); color:var(--accent);">Publish Product 🚀</button>
                    <button class="btn-secondary" onclick="resetFormToCreateMode()" id="cancelEditBtn" style="display:none; background:#ef4444;">Cancel Edit ✖</button>
                </div>
            </div>
        </div>

        <div class="admin-card" style="margin-top: 25px; background: #fff;">
            <h3>🛠️ Manage Products</h3>
            <div id="adminProductListContainer" style="margin-top: 15px; max-height: 500px; overflow-y: auto;"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let isEditMode = false;
        let currentEditProductKey = "";
        let existingMainImageUrl = "";
        let editorInstance = null;
        let policyEditorInstance = null;
        const pageURL = "https://bismillah-gadget-zone-bd-default-rtdb.firebaseio.com/pages.json";

        ClassicEditor.create(document.querySelector('#prodDetails'), {
            toolbar: [ 'heading', '|', 'bold', 'italic', 'link', 'bulletedList', 'numberedList', 'insertTable', 'undo', 'redo' ]
        }).then(editor => { editorInstance = editor; }).catch(e => console.error(e));

        ClassicEditor.create(document.querySelector('#policyDetails'), {
            toolbar: [ 'heading', '|', 'bold', 'italic', 'link', 'bulletedList', 'numberedList', 'undo', 'redo' ]
        }).then(editor => { 
            policyEditorInstance = editor; 
            loadPageContentToEdit();
        }).catch(e => console.error(e));

        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem("adminLoggedIn") === "true") showAdminPanel();
        });

        function showAdminPanel() {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('adminPanelMain').style.display = 'block'; 
            document.body.style.alignItems = 'flex-start';
            loadCategoriesIntoDropdown();
            loadProductsIntoManageList(); 
            loadBillboardCategoriesDropdown();
            loadAdminBillboards();
        }

        async function loadPageContentToEdit() {
            const pageType = document.getElementById('policyPageType').value;
            const res = await fetch(`https://bismillah-gadget-zone-bd-default-rtdb.firebaseio.com/pages/${pageType}.json`);
            const data = await res.json();
            if (policyEditorInstance) {
                policyEditorInstance.setData(data ? data.content : "");
            }
        }

        async function savePageContent() {
            const pageType = document.getElementById('policyPageType').value;
            const content = policyEditorInstance ? policyEditorInstance.getData() : "";

            await fetch(`https://bismillah-gadget-zone-bd-default-rtdb.firebaseio.com/pages/${pageType}.json`, {
                method: 'PUT',
                body: JSON.stringify({ content, updatedAt: Date.now() })
            });

            alert("🎉 পলিসি পেজের বিষয়বস্তু সফলভাবে সেভ করা হয়েছে!");
        }

        async function loadBillboardCategoriesDropdown() {
            const dropdown = document.getElementById('billboardCategorySelect');
            if (!dropdown) return;
            dropdown.innerHTML = '<option value="">ক্যাটাগরি সিলেক্ট করুন (Optional)</option>';
            const res = await fetch(catURL);
            const catData = await res.json();
            if (catData) {
                Object.keys(catData).forEach(key => {
                    dropdown.innerHTML += `<option value="${catData[key].name}">${catData[key].name}</option>`;
                });
            }
        }

        async function loadAdminBillboards() {
            const list = document.getElementById('adminBillboardList');
            if (!list) return;
            const res = await fetch(billboardURL);
            const data = await res.json();
            list.innerHTML = "";
            if (data) {
                Object.keys(data).forEach(key => {
                    list.innerHTML += `
                        <div style="display:flex; justify-content:space-between; align-items:center; background:#fff; padding:8px; border:1px solid #cbd5e1; border-radius:8px;">
                            <small>📂 ${data[key].category || 'সাধারণ ব্যানার'}</small>
                            <button class="delete-prod-btn" onclick="deleteBillboard('${key}')">Delete 🗑️</button>
                        </div>
                    `;
                });
            }
        }

        async function uploadBillboardBanner() {
            const fileInput = document.getElementById('billboardImageInput');
            const file = fileInput.files[0];
            const category = document.getElementById('billboardCategorySelect').value;
            if (!file) return alert("ফাইল সিলেক্ট করুন!");

            let mediaUrl = await fileToBase64(file);
            let mediaType = file.type.includes('video') ? "video" : "image";

            await fetch(billboardURL, {
                method: 'POST',
                body: JSON.stringify({ mediaUrl, mediaType, category, createdAt: Date.now() })
            });

            alert("🎉 সেভ হয়েছে!");
            fileInput.value = "";
            loadAdminBillboards();
        }

        function fileToBase64(file) {
            return new Promise((res, rej) => {
                const reader = new FileReader();
                reader.onload = () => res(reader.result);
                reader.onerror = e => rej(e);
                reader.readAsDataURL(file);
            });
        }

        async function deleteBillboard(key) {
            if (!confirm("ডিলিট করবেন?")) return;
            await fetch(`https://bismillah-gadget-zone-bd-default-rtdb.firebaseio.com/billboards/${key}.json`, { method: 'DELETE' });
            loadAdminBillboards();
        }

        function adminLogout() {
            sessionStorage.removeItem("adminLoggedIn");
            window.location.reload();
        }

        async function handleAdminLogin(e) {
            e.preventDefault();
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            if (user === "admin" && pass === "admin123") {
                sessionStorage.setItem("adminLoggedIn", "true");
                showAdminPanel();
            } else { alert("❌ ভুল লগইন ডাটা!"); }
        }

        async function loadProductsIntoManageList() {
            const container = document.getElementById('adminProductListContainer');
            const res = await fetch(dbURL);
            const data = await res.json();
            if(!data) { container.innerHTML = "<p>কোনো প্রোডাক্ট নেই!</p>"; return; }
            container.innerHTML = "";
            Object.keys(data).forEach(key => {
                const prod = data[key];
                const isOut = (prod.stockStatus === 'Out of Stock' || parseInt(prod.stockQty) <= 0);
                container.innerHTML += `
                    <div class="product-manage-row">
                        <div class="prod-info-left">
                            <img src="${prod.mainImage || 'logo.JPG'}">
                            <div>
                                <strong>${prod.name}</strong><br>
                                <small>${prod.category} - ৳${prod.price} | <b style="color:${isOut?'red':'green'}">${isOut?'Out of Stock':'In Stock ('+(prod.stockQty||10)+' Pcs)'}</b></small>
                            </div>
                        </div>
                        <div>
                            <button class="edit-prod-btn" onclick="prepareEditProduct('${key}')">Edit ✏️</button>
                            <button class="delete-prod-btn" onclick="deleteProductFromFirebase('${key}')">Delete 🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        async function prepareEditProduct(key) {
            const res = await fetch(`https://bismillah-gadget-zone-bd-default-rtdb.firebaseio.com/products/${key}.json`);
            const prod = await res.json();
            if (!prod) return;

            isEditMode = true;
            currentEditProductKey = key;
            existingMainImageUrl = prod.mainImage || "";

            document.getElementById('formActionTitle').innerText = "✏️ Edit Product";
            document.getElementById('publishBtn').innerText = "Update Product 🔄";
            document.getElementById('cancelEditBtn').style.display = 'block';

            document.getElementById('prodName').value = prod.name || "";
            document.getElementById('prodRegularPrice').value = prod.regularPrice || prod.price || "";
            document.getElementById('prodPrice').value = prod.price || "";
            document.getElementById('prodStockStatus').value = prod.stockStatus || "In Stock";
            document.getElementById('prodStockQty').value = prod.stockQty !== undefined ? prod.stockQty : 10;
            document.getElementById('prodCategory').value = prod.category || "";
            document.getElementById('prodSizes').value = prod.sizes ? prod.sizes.join(', ') : "";
            document.getElementById('prodVideo').value = prod.video || "";
            
            if (editorInstance) editorInstance.setData(prod.details || "");
            document.getElementById('formScrollTarget').scrollIntoView({ behavior: 'smooth' });
        }

        function resetFormToCreateMode() {
            isEditMode = false;
            currentEditProductKey = "";
            document.getElementById('formActionTitle').innerText = "📦 Add New Product";
            document.getElementById('publishBtn').innerText = "Publish Product 🚀";
            document.getElementById('cancelEditBtn').style.display = 'none';
            document.getElementById('prodName').value = "";
            document.getElementById('prodRegularPrice').value = "";
            document.getElementById('prodPrice').value = "";
            document.getElementById('prodStockStatus').value = "In Stock";
            document.getElementById('prodStockQty').value = "10";
            if (editorInstance) editorInstance.setData("");
        }

        async function deleteProductFromFirebase(key) {
            if(!confirm("ডিলিট করবেন?")) return;
            await fetch(`https://bismillah-gadget-zone-bd-default-rtdb.firebaseio.com/products/${key}.json`, { method: 'DELETE' });
            loadProductsIntoManageList();
        }

        async function uploadProductWithImages() {
            const name = document.getElementById('prodName').value.trim();
            const regularPrice = parseFloat(document.getElementById('prodRegularPrice').value) || parseFloat(document.getElementById('prodPrice').value);
            const price = parseFloat(document.getElementById('prodPrice').value);
            const stockStatus = document.getElementById('prodStockStatus').value;
            const stockQty = parseInt(document.getElementById('prodStockQty').value) || 0;
            const category = document.getElementById('prodCategory').value;
            const sizesRaw = document.getElementById('prodSizes').value.trim();
            const video = document.getElementById('prodVideo').value.trim();
            let details = editorInstance ? editorInstance.getData() : "";

            const mainImageFile = document.getElementById('prodMainImage').files[0];

            if (!name || isNaN(price) || !category) return alert("নাম, দাম ও ক্যাটাগরি পূরণ করুন!");

            const publishBtn = document.getElementById('publishBtn');
            publishBtn.innerText = "Saving...";
            publishBtn.disabled = true;

            try {
                let mainImage = existingMainImageUrl;
                if (mainImageFile) mainImage = await fileToBase64(mainImageFile);

                let sizes = sizesRaw ? sizesRaw.split(',').map(s => s.trim()) : [];
                const productData = { name, regularPrice, price, stockStatus, stockQty, category, video, details, mainImage, sizes };

                if (isEditMode) {
                    await fetch(`https://bismillah-gadget-zone-bd-default-rtdb.firebaseio.com/products/${currentEditProductKey}.json`, { 
                        method: 'PUT', body: JSON.stringify(productData) 
                    });
                } else {
                    await fetch(dbURL, { method: 'POST', body: JSON.stringify(productData) });
                }

                alert("🎉 সেভ করা হয়েছে!");
                window.location.reload();
            } catch (err) { alert("সমস্যা হয়েছে!"); publishBtn.disabled = false; }
        }

        async function loadCategoriesIntoDropdown() {
            const dropdown = document.getElementById('prodCategory');
            dropdown.innerHTML = '<option value="">ক্যাটাগরি সিলেক্ট করুন</option>';
            const res = await fetch(catURL);
            const catData = await res.json();
            if (catData) {
                Object.keys(catData).forEach(key => {
                    dropdown.innerHTML += `<option value="${catData[key].name}">${catData[key].name}</option>`;
                });
            }
        }
    </script>
</body>
</html>
