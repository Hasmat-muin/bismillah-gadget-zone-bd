<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Bismillah Gadget Zone BD</title>
    <style>
        :root {
            --primary: #0f2635;
            --accent: #c5a059;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-main);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 🔐 Login Card */
        .login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 38, 53, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--primary);
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: var(--accent);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        /* 📊 Dashboard Panel */
        .admin-panel {
            display: none;
            width: 100%;
            max-width: 1100px;
            margin: 20px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 25px;
        }

        @media (max-width: 900px) {
            .grid-container { grid-template-columns: 1fr; }
        }

        .form-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .form-section h3 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 8px;
        }

        .variant-row {
            display: flex;
            gap: 10px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        .variant-row input {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 12px;
        }

        /* 🛠️ Modal Box for Edit */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .btn-success { background: #10b981; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        .btn-secondary { background: #64748b; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-danger { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-container" id="loginCard">
        <h2>Admin Portal</h2>
        <p>Bismillah Gadget Zone BD</p>
        <form onsubmit="handleAdminLogin(event); return false;">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="adminUser" placeholder="ইউজারনেম দিন" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="adminPass" placeholder="পাসওয়ার্ড দিন" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
        </form>
    </div>

    <div class="admin-panel" id="adminPanelMain">
        <div class="panel-header">
            <h2>Dashboard Overview</h2>
            <button class="btn-danger" onclick="adminLogout()">Logout 🔓</button>
        </div>

        <div class="grid-container">
            <div>
                <div class="form-section" style="background:#fff;">
                    <h3 style="margin-top:0;">📁 নতুন ক্যাটাগরি তৈরি করুন</h3>
                    <form id="categoryForm" onsubmit="createNewCategory(event)">
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="newCategoryName" placeholder="ক্যাটাগরির নাম (যেমন: Gadget, Watch)" style="flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px;" required>
                            <button type="submit" style="background: var(--primary); color: var(--accent); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 14px;">যোগ করুন</button>
                        </div>
                    </form>
                </div>

                <div class="form-section">
                    <h3>Upload New Product</h3>
                    <div class="input-group">
                        <label>Product Name</label>
                        <input type="text" id="prodName" placeholder="নাম লিখুন">
                    </div>
                    <div class="input-group">
                        <label>Base Price (৳) [ভ্যারিয়েন্ট না থাকলে এটিই মেইন দাম]</label>
                        <input type="number" id="prodPrice" placeholder="মূল্য দিন">
                    </div>
                    <div class="input-group">
                        <label>Category</label>
                        <select id="prodCategory">
                            <option value="Smart Watch">Smart Watch</option>
                            <option value="Earbuds">Earbuds</option>
                            <option value="Power Bank">Power Bank</option>
                            <option value="Adapter">Adapter</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Main Image File</label>
                        <input type="file" id="prodMainImageFile" accept="image/*">
                    </div>
                    <div class="input-group">
                        <label>YouTube Video Link</label>
                        <input type="text" id="prodVideo" placeholder="লিঙ্ক দিন">
                    </div>
                    <div class="input-group">
                        <label>Product Details</label>
                        <textarea id="prodDetails" rows="3" placeholder="বিবরণ লিখুন"></textarea>
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="font-weight: bold; font-size: 13px; color: var(--primary);">Product Variants (কালার অনুযায়ী আলাদা দাম ও ছবি)</label>
                        <div id="variantContainer" style="margin-top: 10px;"></div>
                        <button type="button" class="btn-secondary" style="font-size: 12px; margin-top: 5px;" onclick="addVariantRow()">+ Add Color Variant</button>
                    </div>

                    <button class="btn-success" id="submitBtn" onclick="uploadProductWithImages()">Save & Upload Product</button>
                </div>

                <div class="form-section">
                    <h3>Admin Profile Settings</h3>
                    <form onsubmit="handleCredentialChange(event); return false;">
                        <div class="input-group">
                            <label>Current Password</label>
                            <input type="password" id="currentPass" placeholder="বর্তমান পাসওয়ার্ড দিন" required>
                        </div>
                        <div class="input-group">
                            <label>New Username</label>
                            <input type="text" id="newUsername" placeholder="নতুন ইউজারনেম" required>
                        </div>
                        <div class="input-group">
                            <label>New Password</label>
                            <input type="password" id="newPassword" placeholder="নতুন পাসওয়ার্ড" required>
                        </div>
                        <button type="submit" class="btn-success" style="background: var(--primary); color: var(--accent);">Update Profile Credentials</button>
                    </form>
                </div>
            </div>

            <div class="form-section">
                <h3>Manage Products</h3>
                <div id="adminProductsGrid"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 style="margin-top:0; color: var(--primary);">Edit Product</h3>
            <input type="hidden" id="editProductId">
            <div class="input-group">
                <label>Product Name</label>
                <input type="text" id="editProdName">
            </div>
            <div class="input-group">
                <label>Base Price (৳)</label>
                <input type="number" id="editProdPrice">
            </div>
            <div class="input-group">
                <label>Category</label>
                <select id="editProdCategory">
                    <option value="Smart Watch">Smart Watch</option>
                    <option value="Earbuds">Earbuds</option>
                    <option value="Power Bank">Power Bank</option>
                    <option value="Adapter">Adapter</option>
                </select>
            </div>
            <div class="input-group">
                <label>YouTube Video Link</label>
                <input type="text" id="editProdVideo">
            </div>
            <div class="input-group">
                <label>Product Details</label>
                <textarea id="editProdDetails" rows="3"></textarea>
            </div>

            <div style="margin-bottom: 15px;">
                <label style="font-weight: bold; font-size: 13px;">Edit Variants</label>
                <div id="editVariantContainer" style="margin-top: 10px;"></div>
                <button type="button" class="btn-secondary" style="font-size: 11px;" onclick="addEditVariantRow('', '', '')">+ Add Variant</button>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-success" onclick="updateProductComplete()">Update Changes</button>
                <button class="btn-secondary" style="background:#ef4444;" onclick="document.getElementById('editModal').style.display='none'">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem("adminLoggedIn") === "true") {
                showAdminPanel();
            }
        });

        function showAdminPanel() {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('adminPanelMain').style.display = 'block';
            if (typeof fetchProducts === 'function') { fetchProducts(); }
        }

        function adminLogout() {
            sessionStorage.removeItem("adminLoggedIn");
            alert("🔒 সফলভাবে লগআউট করা হয়েছে!");
            window.location.reload();
        }
    </script>
</body>
</html>
