<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bismillah Gadget Zone BD</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #0f2635;
            --accent: #c5a059;
            --accent-light: #e0be7a;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg-main); 
            margin: 0; 
            padding: 0; 
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 12% 15%, rgba(197, 160, 89, 0.16), transparent 42%),
                radial-gradient(circle at 88% 25%, rgba(15, 38, 53, 0.10), transparent 45%),
                radial-gradient(circle at 30% 85%, rgba(197, 160, 89, 0.12), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(15, 38, 53, 0.08), transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        header { 
            background: var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 3px solid var(--accent);
            box-shadow: 0 4px 20px rgba(15, 38, 53, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 5%;
        }

        .logo-area { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .site-logo { height: 40px; width: 40px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .brand-name { color: var(--accent); font-size: 18px; font-weight: 700; }

        .cart-btn { 
            background: linear-gradient(135deg, var(--accent), var(--accent-light)); 
            color: var(--primary); border: none; font-weight: 700; border-radius: 8px; 
            cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 6px 10px; font-size: 12px;
        }
        .cart-count { background: var(--primary); color: white; padding: 1px 6px; border-radius: 20px; font-size: 10px; font-weight: bold; }

        .nav-arrow-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(197, 160, 89, 0.4);
            color: var(--accent);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .nav-arrow-btn:active { background: rgba(197, 160, 89, 0.3); transform: scale(0.92); }

        .category-tabs-container { 
            background: white; 
            padding: 10px 5%; 
            border-bottom: 1px solid #e2e8f0; 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            white-space: nowrap;
            position: sticky; 
            top: 133px; 
            z-index: 999; 
        }
        .tab-item { padding: 8px 16px; background: #f1f5f9; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .tab-item.active { background: var(--primary); color: var(--accent); }

        @media (max-width: 380px) {
            .site-logo { height: 32px; width: 32px; }
            .brand-top { font-size: 10px; }
            .brand-name { font-size: 13px; }
            .nav-arrow-btn { width: 26px; height: 26px; font-size: 13px; }
            .cart-btn { padding: 5px 8px; font-size: 10px; }
        }

        #products-container { width: 100%; max-width: 1300px; margin: 0 auto; box-sizing: border-box; }
        .category-section { width: 100%; margin-bottom: 20px; }

        .products-grid { 
            display: flex; 
            gap: 12px; 
            padding: 12px 12px 18px 12px;
            box-sizing: border-box;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            perspective: 1200px;
        }
        .products-grid::-webkit-scrollbar { display: none; }

        .products-grid .product-card {
            flex: 0 0 52%; 
            max-width: 200px;
            scroll-snap-align: start;
        }

        @media (min-width: 600px) {
            .products-grid { 
                display: grid; 
                grid-template-columns: repeat(3, 1fr); 
                gap: 16px; 
                padding: 16px; 
                overflow-x: visible; 
            }
            .products-grid .product-card { flex: unset; max-width: none; }
        }
        @media (min-width: 900px) {
            .products-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px; }
            .info-wrapper { padding: 12px; }
            .product-title { font-size: 14px; margin-bottom: 6px; }
            .price { font-size: 16px; font-weight: 700; }
        }

        .scroll-roll {
            opacity: 0;
            transform: perspective(1000px) rotateX(-62deg) translateY(46px);
            transform-origin: top center;
            transition: transform 0.75s cubic-bezier(.22,.9,.32,1), opacity 0.6s ease;
            will-change: transform, opacity;
        }
        .scroll-roll.roll-in {
            opacity: 1;
            transform: perspective(1000px) rotateX(0deg) translateY(0);
        }
        @media (prefers-reduced-motion: reduce) {
            .scroll-roll, .scroll-roll.roll-in { opacity: 1; transform: none; transition: none; }
        }

        .product-card { 
            background: rgba(255, 255, 255, 0.32); 
            backdrop-filter: blur(18px) saturate(180%); 
            -webkit-backdrop-filter: blur(18px) saturate(180%); 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.55); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
            position: relative; 
            min-height: auto; 
            height: auto;
            box-shadow: 0 8px 28px rgba(15, 38, 53, 0.10), inset 0 1px 0 rgba(255,255,255,0.5);
            transition: transform 0.35s ease, box-shadow 0.35s ease;
            isolation: isolate;
        }

        /* 💧 জলের মতো চকচকে শাইন - কার্ডের উপর দিয়ে হালকা আলো বয়ে যায় */
        .product-card::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(
                115deg,
                transparent 20%,
                rgba(255,255,255,0.55) 42%,
                rgba(255,255,255,0.08) 50%,
                transparent 65%
            );
            background-size: 250% 250%;
            background-position: 120% -20%;
            animation: waterSheen 6s ease-in-out infinite;
            mix-blend-mode: screen;
        }
        .product-card:nth-child(2n)::before { animation-delay: -1.5s; }
        .product-card:nth-child(3n)::before { animation-delay: -3s; }
        .product-card:nth-child(4n)::before { animation-delay: -4.4s; }

        @keyframes waterSheen {
            0%   { background-position: 130% -30%; }
            50%  { background-position: -10% 120%; }
            100% { background-position: 130% -30%; }
        }

        /* কার্ডের ছবি ও লেখা যেন সবসময় পরিষ্কার/স্বচ্ছ দেখা যায় (শাইনের উপরে থাকবে) */
        .card-body {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            transform-origin: center center;
        }

        /* 🍮 জেলি শেক ইফেক্ট - স্ক্রল/সোয়াইপ থামলে চালু হবে */
        @keyframes jellyWobble {
            0%   { transform: scale3d(1, 1, 1); }
            18%  { transform: scale3d(1.09, 0.91, 1) translateY(-1px); }
            36%  { transform: scale3d(0.93, 1.08, 1); }
            54%  { transform: scale3d(1.05, 0.95, 1); }
            70%  { transform: scale3d(0.98, 1.02, 1); }
            85%  { transform: scale3d(1.015, 0.985, 1); }
            100% { transform: scale3d(1, 1, 1); }
        }
        .card-body.jelly-shake {
            animation: jellyWobble 0.65s cubic-bezier(.36, 1.75, .4, 1) both;
        }
        @media (prefers-reduced-motion: reduce) {
            .product-card::before { animation: none; display: none; }
            .card-body.jelly-shake { animation: none; }
        }
        @media (hover: hover) and (pointer: fine) {
            .product-card { animation: cardFloat 5s ease-in-out infinite; }
            .product-card:nth-child(2n) { animation-delay: -1.6s; }
            .product-card:nth-child(3n) { animation-delay: -3.2s; }
            .product-card:nth-child(4n) { animation-delay: -2.1s; }
        }
        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .product-card:hover { 
            animation: none; 
            transform: translateY(-10px); 
            box-shadow: 0 20px 45px rgba(15, 38, 53, 0.18); 
            border-color: rgba(197, 160, 89, 0.5);
        }
        .image-wrapper { width: 100%; aspect-ratio: 1/1; background: rgba(248, 250, 252, 0.35); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .image-wrapper img { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; filter: none; }
        
        .info-wrapper { padding: 8px 10px; display: flex; flex-direction: column; flex-grow: 1; background: rgba(255, 255, 255, 0.4); position: relative; z-index: 2; }
        .product-title { font-size: 13px; line-height: 1.3; font-weight: 600; margin: 0 0 4px 0; color: var(--primary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price { font-size: 14px; font-weight: 700; color: #10b981; margin: 0 0 6px 0; }
        
        .variant-dots { display: flex; gap: 4px; margin-bottom: 6px; }
        .variant-dots button { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #cbd5e1; cursor: pointer; padding: 0; }

        .cart-sidebar { position: fixed; top: 0; right: -340px; width: 320px; height: 100%; background: white; box-shadow: -5px 0 25px rgba(0,0,0,0.1); z-index: 2000; transition: 0.3s ease; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        .close-cart { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--text-muted); }
        .cart-items-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .cart-total { font-size: 16px; font-weight: bold; padding: 15px 0; border-top: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        .checkout-btn { background: var(--primary); color: var(--accent); width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; }

        .order-modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 38, 53, 0.6); 
            backdrop-filter: blur(4px);
            z-index: 3000; 
            justify-content: center; 
            align-items: center; 
            padding: 10px;
            box-sizing: border-box;
        }
        .modal-body { 
            background: white; 
            width: 100%; 
            max-width: 420px; 
            border-radius: 16px; 
            padding: 20px; 
            box-sizing: border-box; 
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.25s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-header h3 { margin: 0; font-size: 16px; color: var(--primary); }
        .close-icon { font-size: 24px; cursor: pointer; color: var(--text-muted); }
        .selected-product-text { background: #f8fafc; border-left: 3px solid var(--accent); padding: 8px 12px; font-size: 12px; margin-bottom: 15px; border-radius: 4px; white-space: pre-line; color: var(--primary); font-weight: 500; }
        
        .input-box { margin-bottom: 12px; text-align: left; }
        .input-box label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-dark); }
        .input-box input, .input-box textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; box-sizing: border-box; }
        .submit-order-btn { background: #25d366; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 10px; }

        .search-bar-wrapper {
            background: var(--primary);
            padding: 12px 5% 14px 5%;
            position: sticky;
            top: 67px;
            z-index: 998;
        }
        .search-bar-box {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-bar-box input {
            width: 100%;
            padding: 11px 40px 11px 16px;
            border-radius: 24px;
            border: 1.5px solid rgba(197, 160, 89, 0.4);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: 0.2s;
        }
        .search-bar-box input::placeholder { color: rgba(255,255,255,0.55); }
        .search-bar-box input:focus {
            background: #ffffff;
            color: var(--text-dark);
            border-color: var(--accent);
        }
        .search-bar-box input:focus::placeholder { color: #94a3b8; }
        .search-icon {
            position: absolute;
            right: 14px;
            font-size: 15px;
            color: var(--accent);
            pointer-events: none;
        }
        .no-results-msg {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .home-btn {
            margin-top: 16px;
            background: var(--primary);
            color: var(--accent);
            border: none;
            padding: 10px 22px;
            border-radius: 24px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }
        .home-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area" style="gap: 6px;">
            <button class="nav-arrow-btn" onclick="goBackPage()" title="আগের পেজে যান">←</button>
            <button class="nav-arrow-btn" onclick="goForwardPage()" title="পরের পেজে যান">→</button>
            <div style="display:flex; align-items:center; gap:8px; cursor:pointer; margin-left:4px;" onclick="window.location.reload();">
                <img src="logo.JPG" class="site-logo" alt="Logo">
                <div style="display:flex; flex-direction:column; line-height:1.2;">
                    <span class="brand-top" style="font-size:18px; font-weight:800; color:var(--accent);">Bismillah</span>
                    <span class="brand-name" style="font-size:11px; font-weight:600; color:#e8d5b0;">Gadget Zone BD</span>
                </div>
            </div>
        </div>
        <button class="cart-btn" onclick="toggleCart()">
            🛒 কার্ট <span class="cart-count" id="cart-count">0</span>
        </button>
    </header>

    <div class="search-bar-wrapper">
        <div class="search-bar-box">
            <input type="text" id="product-search-input" placeholder="প্রোডাক্ট খুঁজুন... (যেমন: earbuds, watch)" oninput="searchProducts(this.value)">
            <span class="search-icon">🔍</span>
        </div>
    </div>

    <div class="category-tabs-container" id="dynamic-category-tabs">
        <button class="tab-item active" onclick="switchCategory('All', this)">⚡ All Items</button>
    </div>

    <main id="products-container"></main>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3 style="margin:0; font-size:16px;">শপিং কার্ট</h3>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items-list" id="cart-items-container"></div>
        <div class="cart-total">
            <span>Total:</span>
            <span>৳ <span id="cart-total-price">0</span></span>
        </div>
        <button class="checkout-btn" onclick="openOrderModal()">Proceed To Checkout</button>
    </div>

    <div class="order-modal-overlay" id="order-modal">
        <div class="modal-body">
            <div class="modal-header">
                <h3>Confirm Order via WhatsApp</h3>
                <span class="close-icon" onclick="closeOrderModal()">&times;</span>
            </div>
            <div class="selected-product-text" id="selected-products-summary"></div>
            
            <div class="input-box">
                <label>আপনার নাম (Your Name)</label>
                <input type="text" id="customer-name" placeholder="এখানে নাম লিখুন" required>
            </div>
            <div class="input-box">
                <label>মোবাইল নাম্বার (Mobile Number)</label>
                <input type="tel" id="customer-phone" placeholder="১১ ডিজিটের মোবাইল নম্বর" required>
            </div>
            <div class="input-box">
                <label>পূর্ণাঙ্গ ঠিকানা (Full Address)</label>
                <textarea id="customer-address" placeholder="গ্রাম/রোড, থানা, জেলা উল্লেখ করুন" required rows="3"></textarea>
            </div>
            <button class="submit-order-btn" onclick="sendOrderToWhatsApp()">Confirm Order on WhatsApp 🚀</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
