<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bismillah Gadget Zone BD</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --primary: #0f2635;
            --accent: #c5a059;
            --accent-light: #e0be7a;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg-main); 
            margin: 0; 
            padding: 0; 
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* ✨ Modern Glow Header */
        header { 
            background: var(--primary); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 3px solid var(--accent);
            box-shadow: 0 4px 20px rgba(15, 38, 53, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 4%;
        }
        
        /* 🛒 Sleek Modern Cart Button */
        .cart-btn { 
            background: linear-gradient(135deg, var(--accent), var(--accent-light)); 
            color: var(--primary); 
            border: none; 
            font-weight: 700; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            padding: 8px 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(197, 160, 89, 0.2);
        }
        .cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(197, 160, 89, 0.35);
        }
        .cart-count { 
            background: var(--primary); 
            color: white; 
            padding: 2px 8px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: bold;
        }
        
        /* 📦 Premium Product Grid */
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px; 
            padding: 40px 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* 🛍️ Floating Square Product Card */
        .product-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 12px; 
            box-shadow: 0 12px 24px rgba(15, 38, 53, 0.12), 0 4px 8px rgba(0, 0, 0, 0.04); 
            border: 1px solid rgba(15, 38, 53, 0.04);
            display: flex; 
            flex-direction: column; 
            text-align: center; 
            position: relative; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            aspect-ratio: 1 / 1; 
            justify-content: space-between;
            box-sizing: border-box;
        }
        
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 38px rgba(15, 38, 53, 0.18), 0 6px 12px rgba(0, 0, 0, 0.06);
            border-color: rgba(197, 160, 89, 0.3);
        }
        
        .image-wrapper { 
            height: 50%; 
            background: #f8fafc; 
            border-radius: 8px; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            transition: background 0.3s;
            margin-bottom: 8px;
        }
        .product-card:hover .image-wrapper {
            background: #f1f5f9;
        }
        .image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
        }

        .info-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }
        
        .product-title { 
            font-size: 13px; 
            margin: 0 0 4px 0; 
            font-weight: 600; 
            color: var(--primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
            height: 34px;
        }
        .price { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--accent); 
            margin: 0 0 6px 0; 
        }

        .color-variants-wrapper, .color-variants-wrapper + span, .color-label {
            display: none !important;
        }

        .details-section {
            padding: 0 !important;
            margin-bottom: 6px !important;
        }
        .details-section a {
            font-size: 11px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }
        .add-to-cart-btn, .buy-now-btn {
            padding: 6px 4px;
            font-size: 10px;
            font-weight: 700;
            border-radius: 6px;
            flex: 1;
            text-align: center;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .add-to-cart-btn {
            background: #f1f5f9;
            color: var(--primary);
            border: 1px solid #cbd5e1;
        }
        .add-to-cart-btn:hover {
            background: #e2e8f0;
        }
        .buy-now-btn {
            background: var(--primary);
            color: var(--accent);
        }
        .buy-now-btn:hover {
            opacity: 0.9;
        }
        
        .cart-sidebar { 
            position: fixed; 
            top: 0; 
            right: -360px; 
            width: 350px; 
            height: 100%; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            box-shadow: -10px 0 30px rgba(15, 38, 53, 0.08); 
            z-index: 200; 
            transition: cubic-bezier(0.4, 0, 0.2, 1) 0.35s; 
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
            border-left: 1px solid rgba(197, 160, 89, 0.2);
        }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 14px; }
        .cart-header h3 { margin: 0; font-weight: 700; color: var(--primary); }
        .close-cart { font-size: 28px; cursor: pointer; background: none; border: none; color: var(--text-muted); transition: 0.2s; }
        .close-cart:hover { color: red; }
        .cart-items-list { flex-grow: 1; overflow-y: auto; margin-top: 15px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .remove-item { color: #ef4444; cursor: pointer; font-weight: bold; }
        .cart-total { font-size: 18px; font-weight: 700; border-top: 2px solid #f1f5f9; padding-top: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; color: var(--primary); }
        .checkout-btn { background: var(--primary); color: var(--accent); width: 100%; padding: 14px; font-weight: bold; border: 1px solid var(--primary); border-radius: 10px; cursor: pointer; font-size: 15px; transition: 0.2s; box-shadow: 0 4px 15px rgba(15, 38, 53, 0.2); }
        .checkout-btn:hover { background: var(--accent); color: var(--primary); }

        /* 🎨 ট্যাবগুলোর একটিভ গোল্ডেন কালার স্টাইল (CSS) */
        .category-tabs {
            display: flex; 
            gap: 25px; 
            padding: 15px 4%; 
            background: #fff; 
            border-bottom: 1px solid #e2e8f0;
            overflow-x: auto;
            white-space: nowrap;
        }
        .tab-item {
            font-size: 14px;
            font-weight: 600;
            color: #64748b; /* ডিফল্ট কালার */
            cursor: pointer;
            padding-bottom: 8px;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }
        .tab-item.active {
            color: #c5a059 !important; /* গোল্ডেন কালার */
            border-bottom: 2px solid #c5a059 !important; /* গোল্ডেন আন্ডারলাইন */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img class="site-logo" src="logo.JPG" alt="Logo">
            <div class="brand-text-wrapper">
                <span class="brand-top-name">Bismillah</span>
                <span class="brand-name">Gadget Zone BD</span>
            </div>
        </div>
        <button class="cart-btn" onclick="toggleCart()">
            🛒 Cart <span class="cart-count" id="cart-count">0</span>
        </button>
    </header>

    <div class="category-tabs">
        <span class="tab-item active" onclick="switchCategory('All', this)">All Products</span>
        <span class="tab-item" onclick="switchCategory('Smart Watch', this)">Smart Watch</span>
        <span class="tab-item" onclick="switchCategory('Earbuds', this)">Earbuds</span>
        <span class="tab-item" onclick="switchCategory('Power Bank', this)">Power Bank</span>
        <span class="tab-item" onclick="switchCategory('Adapter', this)">Adapter</span>
    </div>

    <div class="products-grid" id="products-container">
        </div>

    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Shopping Cart</h3>
            <button class="close-cart" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items-list" id="cart-items-container">
            </div>
        <div class="cart-total">
            <span>Total:</span>
            <span>৳ <span id="cart-total-price">0</span></span>
        </div>
        <button class="checkout-btn" onclick="openOrderModal()">Proceed To Checkout</button>
    </div>

    <div class="bottom-modal" id="order-modal">
        <div class="modal-body">
            <div class="modal-header">
                <h3>Confirm Order via WhatsApp</h3>
                <span class="close-icon" onclick="closeOrderModal()">&times;</span>
            </div>
            <div class="selected-product-text" id="selected-products-summary">
                </div>
            <div class="input-box">
                <label>আপনার নাম (Your Name)</label>
                <input type="text" id="customer-name" placeholder="এখানে নাম লিখুন" required>
            </div>
            <div class="input-box">
                <label>মোবাইল নাম্বার (Mobile Number)</label>
                <input type="tel" id="customer-phone" placeholder="এখানে ১১ ডিজিটের নাম্বার দিন" required>
            </div>
            <div class="input-box">
                <label>পূর্ণাঙ্গ ঠিকানা (Full Address)</label>
                <textarea id="customer-address" placeholder="গ্রাম/রোড, থানা, জেলা উল্লেখ করুন" required></textarea>
            </div>
            <button class="submit-order-btn" onclick="sendOrderToWhatsApp()">Confirm Order on WhatsApp 🚀</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
